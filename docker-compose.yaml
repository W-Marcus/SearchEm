services:
  searchem-cli:
    build:
      context: .
      args:
        SURFACE: cli
    stdin_open: true
    tty: true
    volumes:
      - ./data:/data
      - ${HF_CACHE_DIR:-~/.cache/huggingface}:/home/appuser/.cache/huggingface
      - ./data/.SearchEm:/db
    environment:
      - HF_HOME=/home/appuser/.cache/huggingface
    command: ["--dir", "${DATA_DIR:-/data}", "--database", "${DB_DIR:-/db}", "--model", "${MODEL:-Qwen/Qwen3-VL-Embedding-2B}"]

  searchem-rest:
    build:
      context: .
      args:
        SURFACE: rest
    ports:
      - "${REST_PORT:-8000}:8000"
    volumes:
      - ./data:/data
      - ${HF_CACHE_DIR:-~/.cache/huggingface}:/home/appuser/.cache/huggingface
      - ./data/.SearchEm:/db
    environment:
      - HF_HOME=/home/appuser/.cache/huggingface
    command: ["--dir", "${DATA_DIR:-/data}", "--database", "${DB_DIR:-/db}", "--model", "${MODEL:-Qwen/Qwen3-VL-Embedding-2B}"]    


  searchem-frontend:
    build:
      context: ./frontend
    ports:
      - "${FRONTEND_PORT:-4200}:80"
    depends_on:
      searchem-rest:
        condition: service_healthy